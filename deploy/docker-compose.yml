# Production Compose stack — SimanDev
# Usage (on server):
#   cd deploy && cp .env.production.example .env  # fill in values
#   docker compose up -d --build
#
# Local prod-build smoke test (no TLS):
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up --build

name: simandev

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    env_file: .env
    environment:
      STAGING_DOMAIN: ${STAGING_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      STAGING: ${STAGING:-0}
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_METRIKA_ID: ${NEXT_PUBLIC_METRIKA_ID:-}
    restart: unless-stopped
    networks:
      - web
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    networks:
      - web
      - internal
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - pgdata:/var/lib/postgresql/data
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512M

networks:
  web:
    driver: bridge
  internal:
    driver: bridge
    internal: true

volumes:
  pgdata:
  caddy_data:
  caddy_config:
